name: Bug report
description: Something broken in the bridge, playground, or examples
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please search [existing issues](https://github.com/s3roy/native-bridge/issues) first.

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - iOS
        - React Native
        - Web playground / docs site
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: e.g. main @ abc1234, or tag v1.0.0
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open playground in BridgeWebView
        2. Tap "getDeviceInfo"
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Logcat, Xcode console, or browser console output
